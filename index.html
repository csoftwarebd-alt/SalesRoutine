<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duty Manager - Perfect Serial Rotation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #008170; --bg: #f4f4f9; --red: #FF0000; --yellow: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .wrapper { max-width: 1550px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fff; }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-generate { background: #2ecc71; color: white; width: 100%; padding: 15px; font-size: 18px; margin-top: 10px; }
        .btn-copy { background: #0984e3; color: white; margin-top: 10px; padding: 12px; width: 200px; display: none; }
        .member-list { max-height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 5px; margin-top: 10px; background: #fafafa; min-height: 50px; }
        .m-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #fff; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 4px; cursor: grab; }
        .table-container { overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1350px; border: 2px solid #000; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; }
        .header-green { background: #00a86b; color: white; }
        .header-yellow { background: var(--yellow); color: black; font-weight: bold; }
        .date-col { background: #000; color: #fff; width: 100px; }
        .backup-cell { background: var(--red) !important; color: white !important; font-weight: bold; }
        .del-btn { color: red; cursor: pointer; font-weight: bold; background: none; border: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="setup-grid">
        <div class="card">
            <h3>১. মর্নিং প্রোফাইল সেটিংস</h3>
            <div class="input-row">
                <input type="text" id="pName" placeholder="Profile" style="width:110px">
                <input type="text" id="rName" placeholder="Name" style="width:100px">
                <select id="rOff">
                    <option value="Random">Random Off</option>
                    <option value="Friday">Friday</option><option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option><option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                </select>
                <label style="font-size: 12px;"><input type="checkbox" id="needBackup" checked> Backup?</label>
                <button class="btn-add" onclick="addMapping()">Add</button>
            </div>
            <div id="mappingList" class="member-list"></div>
        </div>

        <div class="card">
            <h3>২. CST ও ব্যাকআপ সেটিংস</h3>
            <div class="input-row" style="background: #fff8e1; padding: 10px; border-radius: 5px; border: 1px solid #ffe082;">
                <strong>CST:</strong>
                <input type="text" id="cstName" value="Rahat" style="width:70px">
                <input type="text" id="cstP1" value="Code_minds" style="width:90px">
                <input type="text" id="cstP2" value="app_cake" style="width:90px">
                <select id="cstOff">
                    <option value="Random">Random Off</option>
                    <option value="Friday">Friday</option><option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option><option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                </select>
            </div>
            
            <div class="input-row" style="margin-top:15px">
                <input type="text" id="bName" placeholder="Backup Member Name" style="flex:1">
                <select id="bOff">
                    <option value="None">No Off</option>
                    <option value="Random">Random Off</option>
                    <option value="Friday">Friday</option><option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option><option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option><option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                </select>
                <button class="btn-add" onclick="addBackup()">Add Backup</button>
            </div>
            <div id="backupList" class="member-list"></div>
            
            <div class="input-row" style="margin-top:10px">
                <label>শুরু:</label> <input type="date" id="startDate" value="2026-04-01">
                <label>দিন:</label> <input type="number" id="numDays" value="15" style="width:50px">
            </div>
        </div>
    </div>

    <button class="btn-generate" onclick="generateRoutine()">GENERATE PERFECT ROUTINE</button>
    <button class="btn-copy" id="copyBtn" onclick="copyTable()">COPY FOR EXCEL</button>
    <div class="table-container" id="output"></div>
</div>

<script>
    let mapping = [];
    let backups = [];

    new Sortable(document.getElementById('mappingList'), { animation: 150, onEnd: updateArrays });
    new Sortable(document.getElementById('backupList'), { animation: 150, onEnd: updateArrays });

    function addMapping() {
        const p = document.getElementById('pName').value;
        const r = document.getElementById('rName').value;
        const o = document.getElementById('rOff').value;
        const b = document.getElementById('needBackup').checked;
        if(p && r) { mapping.push({ p, r, off: o, backup: b }); renderUI(); }
    }

    function addBackup() {
        const n = document.getElementById('bName').value;
        const o = document.getElementById('bOff').value;
        if(n) { backups.push({ name: n, off: o }); renderUI(); }
    }

    function updateArrays() {
        const mItems = document.querySelectorAll('#mappingList .m-item');
        if(mItems.length > 0) mapping = Array.from(mItems).map(el => JSON.parse(el.dataset.info));
        const bItems = document.querySelectorAll('#backupList .m-item');
        if(bItems.length > 0) backups = Array.from(bItems).map(el => JSON.parse(el.dataset.info));
    }

    function renderUI() {
        document.getElementById('mappingList').innerHTML = mapping.map((m,i)=>`
            <div class="m-item" data-info='${JSON.stringify(m)}'>
                <span>⠿ <b>${m.p}</b>: ${m.r} (${m.off})</span>
                <button class="del-btn" onclick="mapping.splice(${i},1);renderUI()">✖</button>
            </div>`).join('');
        document.getElementById('backupList').innerHTML = backups.map((b,i)=>`
            <div class="m-item" data-info='${JSON.stringify(b)}'>
                <span>⠿ <b>${b.name}</b> (Off: ${b.off})</span>
                <button class="del-btn" onclick="backups.splice(${i},1);renderUI()">✖</button>
            </div>`).join('');
    }

    function copyTable() {
        const table = document.querySelector("table");
        if(!table) return;
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand("copy");
        alert("Routine Copied!");
    }

    function generateRoutine() {
        updateArrays();
        if(mapping.length === 0) { alert("Please add profiles first!"); return; }
        
        const start = new Date(document.getElementById('startDate').value);
        const daysCount = parseInt(document.getElementById('numDays').value);
        const cstData = { n: document.getElementById('cstName').value, p1: document.getElementById('cstP1').value, p2: document.getElementById('cstP2').value, off: document.getElementById('cstOff').value };
        const daysArr = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        let backupPointer = 0; // ব্যাকআপ মেম্বারদের সিরিয়াল মেইনটেইন করার জন্য
        let html = `<table><thead><tr><th rowspan="2" class="date-col">Date</th><th rowspan="2" style="background:#fff">Day</th><th colspan="${mapping.length}" class="header-green">Morning</th><th colspan="2" class="header-yellow">CST</th></tr><tr>`;
        mapping.forEach(m => html += `<th class="header-green">${m.p}</th>`);
        html += `<th class="header-yellow">${cstData.p1}</th><th class="header-yellow">${cstData.p2}</th></tr></thead><tbody>`;

        for (let i = 0; i < daysCount; i++) {
            let current = new Date(start);
            current.setDate(start.getDate() + i);
            let dayName = daysArr[current.getDay()];
            let usedBackupsToday = new Set(); 

            html += `<tr><td class="date-col">${current.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'})}</td><td>${dayName}</td>`;

            const getNextBackup = () => {
                if (backups.length === 0) return "Substitute";
                
                // ব্যাকআপ মেম্বারদের সিরিয়াল অনুযায়ী চেক করা
                for (let j = 0; j < backups.length; j++) {
                    let bIdx = (backupPointer + j) % backups.length;
                    let b = backups[bIdx];
                    
                    // ব্যাকআপ মেম্বারের নিজের অফ-ডে কি না চেক
                    let isBOff = false;
                    if (b.off === 'Random') {
                        // আপনার ছবি অনুযায়ী র্যান্ডম অফগুলো সপ্তাহে ১ দিন (যেমন রবিবার বা শুক্রবার) ফিক্সড হয়
                        isBOff = (dayName === 'Sunday'); // উদাহরন হিসেবে রবিবার ধরা হয়েছে
                    } else {
                        isBOff = (dayName === b.off);
                    }

                    if (!isBOff && !usedBackupsToday.has(b.name)) {
                        usedBackupsToday.add(b.name);
                        backupPointer = (bIdx + 1) % backups.length; // পরবর্তী ডাকের জন্য পয়েন্টার সরানো
                        return b.name;
                    }
                }
                return "Substitute"; 
            };

            // মর্নিং ডিউটি লজিক
            mapping.forEach((m, mIdx) => {
                let isOff = false;
                if (m.off === 'Random') {
                    // ডায়াগনাল রোটেশন লজিক: মেম্বারদের অফ-ডে সিরিয়াল অনুযায়ী সরবে
                    isOff = ((i + mIdx) % 7 === 0);
                } else {
                    isOff = (dayName === m.off);
                }

                if (isOff) {
                    html += m.backup ? `<td class="backup-cell">${getNextBackup()}</td>` : `<td style="background:#eee; color:#888">OFF</td>`;
                } else {
                    html += `<td>${m.r}</td>`;
                }
            });

            // CST ডিউটি লজিক
            let isCstOff = (cstData.off === 'Random') ? ((i + mapping.length) % 7 === 0) : (dayName === cstData.off);

            if(isCstOff) {
                html += `<td colspan="2" class="backup-cell">${getNextBackup()}</td>`;
            } else {
                html += `<td colspan="2">${cstData.n}</td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('output').innerHTML = html + `</tbody></table>`;
        document.getElementById('copyBtn').style.display = 'block';
    }
</script>
</body>
</html>
